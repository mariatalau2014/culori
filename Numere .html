<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jocul de Mate - Sudden Death</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        :root {
            --primary-color: #f472b6;
            --primary-hover: #db2777;
            --secondary-color: #a78bfa;
            --bg-color: #fce7f3;
            --card-bg: #ffffff;
            --text-color: #831843;
            --success-color: #34d399;
            --error-color: #fb7185;
            --border-radius: 25px;
            --shadow: 0 10px 25px -5px rgba(244, 114, 182, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#fbcfe8 15%, transparent 16%), radial-gradient(#fbcfe8 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 500px;
            text-align: center;
            position: relative;
            border: 4px solid #fff;
            min-height: 550px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        /* Bara de progres */
        .progress-container {
            width: 100%;
            background-color: #fce7f3;
            border-radius: 999px;
            height: 12px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 2px solid #fbcfe8;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #f472b6, #a78bfa);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        header {
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 0px #fbcfe8;
            line-height: 1.2;
        }

        .subtitle {
            font-size: 1rem;
            color: #9d174d;
            font-weight: 700;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #fdf2f8;
            padding: 10px 15px;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            font-weight: 800;
            color: var(--primary-color);
            border: 2px dashed #fbcfe8;
            font-size: 1rem;
        }

        /* Ecrane */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            width: 100%;
            animation: fadeIn 0.4s ease;
        }

        .screen.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Stiluri Problema Matematică */
        .equations {
            background: #fff1f2;
            border: 3px solid #fda4af;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1.6rem;
            line-height: 2;
            color: var(--text-color);
            width: 100%;
        }

        .eq-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        /* Stiluri Problema Text (Diana & Mia) */
        .word-problem {
            background: #fff;
            border: 3px dashed #a78bfa;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            font-size: 1.15rem;
            line-height: 1.6;
            color: #4b5563;
            text-align: left;
            width: 100%;
        }
        
        .word-problem strong {
            color: var(--secondary-color);
            font-size: 1.3rem;
        }

        .variable { color: #db2777; }
        .value { color: #4b5563; }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 1.5rem;
            width: 100%;
        }

        .input-wrapper { display: flex; flex-direction: column; text-align: left; }
        
        label { 
            font-size: 0.95rem; 
            margin-bottom: 5px; 
            font-weight: 800; 
            color: #be185d; 
        }

        input[type="number"] {
            padding: 12px;
            border: 3px solid #fbcfe8;
            border-radius: 15px;
            font-size: 1.3rem;
            transition: all 0.2s;
            outline: none;
            width: 100%;
            text-align: center;
            color: var(--text-color);
            font-weight: 700;
            background: #fff;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            background: #fff0f5;
            transform: scale(1.02);
            box-shadow: 0 0 0 5px rgba(244, 114, 182, 0.2);
        }

        /* Butoane */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 14px 30px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #be185d;
            margin-top: 10px;
        }

        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 0 #be185d; }
        .btn:active { transform: translateY(4px); box-shadow: 0 0 0 #be185d; }

        .btn-secondary {
            background-color: var(--secondary-color);
            box-shadow: 0 6px 0 #7c3aed;
            margin-top: 10px;
        }
        .btn-secondary:hover { box-shadow: 0 8px 0 #7c3aed; }
        .btn-secondary:active { box-shadow: 0 0 0 #7c3aed; }

        .message {
            margin-top: 1rem;
            padding: 12px;
            border-radius: 15px;
            font-size: 1rem;
            font-weight: 700;
            min-height: 50px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.success { background-color: #d1fae5; color: #047857; opacity: 1; border: 2px solid #6ee7b7; }
        .message.error { background-color: #ffe4e6; color: #be123c; opacity: 1; border: 2px solid #fda4af; }

        /* Final Screen */
        .big-emoji { font-size: 4rem; margin-bottom: 10px; display: block; }
        .big-score { font-size: 4.5rem; font-weight: 900; color: var(--primary-color); line-height: 1; margin: 10px 0; text-shadow: 3px 3px 0px #fbcfe8; }
        .time-display { font-size: 1.6rem; color: #831843; margin-bottom: 1.5rem; font-weight: 700; background: #fff1f2; display: inline-block; padding: 10px 20px; border-radius: 50px; }

        /* Leaderboard Screen */
        #leaderboard-list {
            list-style: none;
            width: 100%;
            max-height: 250px;
            overflow-y: auto;
            text-align: left;
            margin-bottom: 20px;
            padding: 5px;
        }

        .leaderboard-item {
            background: #fff1f2;
            border: 2px solid #fbcfe8;
            border-radius: 15px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: 700;
            color: #831843;
        }

        .lb-date { font-size: 0.85rem; color: #be185d; }
        .lb-score { font-size: 1.1rem; color: var(--primary-color); }
        .lb-time { font-size: 0.8rem; color: #666; font-weight: 400; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

    </style>
</head>
<body>

    <main class="container" id="game-card">
        
        <!-- Ecranul 1: Joc -->
        <div id="game-screen" class="screen active">
            <header>
                <h1>✨ Provocarea de Mate ✨</h1>
                <p class="subtitle">Atenție! Dacă greșești, o iei de la capăt!</p>
            </header>

            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>

            <div class="status-bar">
                <span>📝 <span id="problem-count">1</span>/5</span>
                <span>⏱️ <span id="timer">00:00</span></span>
            </div>

            <!-- Container pentru problema curentă -->
            <div id="problem-container"></div>

            <form id="game-form" onsubmit="return false;" style="width: 100%;">
                <div class="input-group">
                    <div class="input-wrapper">
                        <label id="label-var1" for="input-var1">Valoarea 1:</label>
                        <input type="number" id="input-var1" placeholder="?" required autocomplete="off">
                    </div>
                    <div class="input-wrapper">
                        <label id="label-var2" for="input-var2">Valoarea 2:</label>
                        <input type="number" id="input-var2" placeholder="?" required autocomplete="off">
                    </div>
                </div>
                <button type="button" id="check-btn" class="btn">Verifică ✨</button>
            </form>

            <div id="feedback-msg" class="message"></div>
        </div>

        <!-- Ecranul 2: Final (Doar dacă câștigă) -->
        <div id="final-screen" class="screen">
            <span class="big-emoji">🎉</span>
            <h2>Felicitări! Ai câștigat!</h2>
            <br>
            <p class="subtitle">Timpul tău:</p>
            
            <div class="time-display" id="final-time">15 minute</div>
            
            <p style="margin-bottom: 10px; font-weight: 700;">Scorul tău:</p>
            <div class="big-score" id="final-score">5/5</div>

            <button type="button" id="restart-btn" class="btn">Joacă din nou 🚀</button>
            <button type="button" id="show-leaderboard-btn" class="btn btn-secondary">Vezi Clasamentul 🏆</button>
        </div>

        <!-- Ecranul 3: Clasament -->
        <div id="leaderboard-screen" class="screen">
            <h2>🏆 Clasamentul</h2>
            <p class="subtitle" style="margin-bottom: 15px; font-size: 0.9rem;">Doar câștigătorii:</p>
            
            <ul id="leaderboard-list">
                <!-- JS populate -->
            </ul>

            <button type="button" id="back-to-final-btn" class="btn btn-secondary">Înapoi ⬅️</button>
        </div>

    </main>

    <script>
        // Configurare
        const MAX_PROBLEMS = 5;
        const STORAGE_KEY = 'mate_game_leaderboard_v3';
        
        // Starea jocului
        let problemsSolved = 0;
        let score = 0;
        let isProblemSolved = false;
        let startTime = null;
        let timerInterval = null;
        let currentProblemData = null;

        // Elemente DOM
        const problemContainer = document.getElementById('problem-container');
        const labelVar1 = document.getElementById('label-var1');
        const labelVar2 = document.getElementById('label-var2');
        const inputVar1 = document.getElementById('input-var1');
        const inputVar2 = document.getElementById('input-var2');
        const checkBtn = document.getElementById('check-btn');
        const feedbackMsg = document.getElementById('feedback-msg');
        const countDisplay = document.getElementById('problem-count');
        const timerDisplay = document.getElementById('timer');
        const progressBar = document.getElementById('progress-bar');
        
        // Ecrane
        const gameScreen = document.getElementById('game-screen');
        const finalScreen = document.getElementById('final-screen');
        const leaderboardScreen = document.getElementById('leaderboard-screen');
        const finalTimeDisplay = document.getElementById('final-time');
        const finalScoreDisplay = document.getElementById('final-score');
        const leaderboardList = document.getElementById('leaderboard-list');

        // Butoane
        const restartBtn = document.getElementById('restart-btn');
        const showLeaderboardBtn = document.getElementById('show-leaderboard-btn');
        const backToFinalBtn = document.getElementById('back-to-final-btn');

        // --- Gestionare Ecrane ---
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- Inițializare Joc ---
        function initGame() {
            problemsSolved = 0;
            score = 0;
            startTime = Date.now();
            isProblemSolved = false;

            switchScreen('game-screen');
            countDisplay.textContent = "1";
            updateProgress();
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();

            generateProblem();
        }

        function updateTimer() {
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);
            const minutes = Math.floor(diff / 60).toString().padStart(2, '0');
            const seconds = (diff % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${minutes}:${seconds}`;
        }

        // --- Generare Probleme ---
        function generateProblem() {
            isProblemSolved = false;
            inputVar1.value = '';
            inputVar2.value = '';
            inputVar1.focus();
            feedbackMsg.className = 'message';
            feedbackMsg.textContent = '';

            const type = Math.random() < 0.5 ? 'math' : 'word';

            if (type === 'math') {
                generateMathProblem();
            } else {
                generateWordProblem();
            }
        }

        function generateMathProblem() {
            const min = 1;
            const max = 25;
            let num1 = Math.floor(Math.random() * (max - min + 1)) + min;
            let num2 = Math.floor(Math.random() * (max - min + 1)) + min;

            if (num2 > num1) { [num1, num2] = [num2, num1]; }

            const valA = num1;
            const valB = num2;
            const K = valA + valB;
            const M = valA - valB;

            currentProblemData = {
                correct1: valA,
                correct2: valB
            };

            labelVar1.textContent = "Valoarea lui a:";
            labelVar2.textContent = "Valoarea lui b:";

            problemContainer.innerHTML = `
                <div class="equations">
                    <div class="eq-row">
                        <span class="variable">a</span> + <span class="variable">b</span> = <span class="value">${K}</span>
                    </div>
                    <div class="eq-row">
                        <span class="variable">a</span> - <span class="variable">b</span> = <span class="value">${M}</span>
                    </div>
                </div>
            `;
        }

        function generateWordProblem() {
            const minAge = 5;
            const maxAge = 18;
            
            const n = Math.floor(Math.random() * (maxAge - minAge + 1)) + minAge; // Mia
            const Z = Math.floor(Math.random() * 5) + 1; // Diferența
            
            const K = n + Z; // Diana
            const A = K + n; // Total

            currentProblemData = {
                correct1: K,
                correct2: n
            };

            labelVar1.textContent = "Câți ani are Diana:";
            labelVar2.textContent = "Câți ani are Mia:";

            // Corectitudine logică: afișăm diferența Z, nu totalul A
            problemContainer.innerHTML = `
                <div class="word-problem">
                    Diana are <strong>${Z}</strong> ani mai mult decât Mia.
                    <br><br>
                    Împreună au <strong>${A}</strong> ani.
                    <br><br>
                    <em>Află câți ani are Diana și câți ani are Mia.</em>
                </div>
            `;
        }

        // --- Verificare Răspuns ---
        function checkAnswer() {
            if (isProblemSolved) return;

            const userVal1 = parseInt(inputVar1.value);
            const userVal2 = parseInt(inputVar2.value);

            if (isNaN(userVal1) || isNaN(userVal2)) {
                showMessage("Trebuie să scrii ambele răspunsuri!", "error");
                return;
            }

            if (userVal1 === currentProblemData.correct1 && userVal2 === currentProblemData.correct2) {
                // CORECT
                score++;
                isProblemSolved = true;
                showMessage("Super! Corect! 🌟", "success");
                setTimeout(nextProblem, 1000); 
            } else {
                // GREȘIT - RESTART
                showMessage("Ups! Ai greșit. O luăm de la capăt! 🔄", "error");
                document.getElementById('game-card').classList.add('shake');
                
                setTimeout(() => {
                    document.getElementById('game-card').classList.remove('shake');
                    initGame(); // Aici se face restartul
                }, 2000); // Așteptăm 2 secunde să vadă mesajul
            }
        }

        function nextProblem() {
            problemsSolved++;
            if (problemsSolved >= MAX_PROBLEMS) {
                endGame();
            } else {
                countDisplay.textContent = problemsSolved + 1;
                updateProgress();
                generateProblem();
            }
        }

        function updateProgress() {
            const percentage = (problemsSolved / MAX_PROBLEMS) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        // --- Finalizare și Salvare ---
        function endGame() {
            clearInterval(timerInterval);
            
            finalScoreDisplay.textContent = `${score}/${MAX_PROBLEMS}`;
            finalTimeDisplay.textContent = "15 minute";
            
            saveScore(score);
            switchScreen('final-screen');
            progressBar.style.width = '100%';
        }

        function showMessage(text, type) {
            feedbackMsg.textContent = text;
            feedbackMsg.className = `message ${type}`;
        }

        // --- Sistem Clasament ---
        function saveScore(newScore) {
            const now = new Date();
            const dateString = now.toLocaleDateString('ro-RO', { 
                day: '2-digit', month: '2-digit', year: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });

            const newEntry = {
                date: dateString,
                score: newScore,
                timeText: "(15 minute)"
            };

            let leaderboard = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
            leaderboard.push(newEntry);
            leaderboard.sort((a, b) => b.score - a.score);
            if (leaderboard.length > 10) leaderboard = leaderboard.slice(0, 10);

            localStorage.setItem(STORAGE_KEY, JSON.stringify(leaderboard));
        }

        function renderLeaderboard() {
            leaderboardList.innerHTML = '';
            const leaderboard = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

            if (leaderboard.length === 0) {
                leaderboardList.innerHTML = '<li style="text-align:center; color:#888; padding:20px;">Nu există scoruri încă.</li>';
                return;
            }

            leaderboard.forEach((entry, index) => {
                const li = document.createElement('li');
                li.className = 'leaderboard-item';
                li.innerHTML = `
                    <div style="display:flex; flex-direction:column;">
                        <span class="lb-date">${index + 1}. ${entry.date}</span>
                    </div>
                    <div style="text-align:right;">
                        <div class="lb-score">${entry.score} puncte</div>
                        <div class="lb-time">${entry.timeText}</div>
                    </div>
                `;
                leaderboardList.appendChild(li);
            });
        }

        // --- Event Listeners ---
        checkBtn.onclick = checkAnswer;
        restartBtn.onclick = initGame;
        
        showLeaderboardBtn.onclick = () => {
            renderLeaderboard();
            switchScreen('leaderboard-screen');
        };

        backToFinalBtn.onclick = () => {
            switchScreen('final-screen');
        };

        [inputVar1, inputVar2].forEach(input => {
            input.onkeypress = (e) => {
                if (e.key === 'Enter') {
                    if (isProblemSolved) {
                        if (problemsSolved < MAX_PROBLEMS) nextProblem();
                    } else {
                        checkAnswer();
                    }
                }
            };
        });

        // Start
        initGame();

    </script>
</body>
</html>
