<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jocul de Mate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap');

        :root {
            /* Culori "Kawaii" / Pastelate pentru fetițe */
            --primary-color: #f472b6; /* Roz */
            --primary-hover: #db2777;
            --secondary-color: #a78bfa; /* Lavandă */
            --bg-color: #fce7f3; /* Roz foarte deschis */
            --card-bg: #ffffff;
            --text-color: #831843; /* Roz închis pentru text */
            --success-color: #34d399;
            --error-color: #fb7185;
            --border-radius: 25px; /* Colțuri foarte rotunjite */
            --shadow: 0 10px 25px -5px rgba(244, 114, 182, 0.4), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Nunito', sans-serif; /* Font rotunjit și prietenos */
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#fbcfe8 15%, transparent 16%), radial-gradient(#fbcfe8 15%, transparent 16%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 480px;
            text-align: center;
            position: relative;
            border: 4px solid #fff;
        }

        /* Bara de progres - stil bomboană */
        .progress-container {
            width: 100%;
            background-color: #fce7f3;
            border-radius: 999px;
            height: 12px;
            margin-bottom: 25px;
            overflow: hidden;
            border: 2px solid #fbcfe8;
        }
        
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #f472b6, #a78bfa);
            width: 0%;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); /* Animație elastică */
        }

        header {
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
            text-shadow: 2px 2px 0px #fbcfe8;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #9d174d;
            font-weight: 700;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #fdf2f8;
            padding: 12px 20px;
            border-radius: 20px;
            margin-bottom: 2rem;
            font-weight: 800;
            color: var(--primary-color);
            border: 2px dashed #fbcfe8;
            font-size: 1.1rem;
        }

        /* Zona jocului */
        .game-area {
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        .hidden {
            display: none !important;
        }

        .equations {
            background: #fff1f2;
            border: 3px solid #fda4af;
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            font-family: 'Nunito', sans-serif;
            font-weight: 900;
            font-size: 1.8rem;
            line-height: 2.2;
            color: var(--text-color);
        }

        .eq-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }

        .variable { color: #db2777; }
        .value { color: #4b5563; }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 2rem;
        }

        .input-wrapper { display: flex; flex-direction: column; text-align: left; }
        
        label { 
            font-size: 1rem; 
            margin-bottom: 8px; 
            font-weight: 800; 
            color: #be185d; 
        }

        input[type="number"] {
            padding: 15px;
            border: 3px solid #fbcfe8;
            border-radius: 15px;
            font-size: 1.5rem;
            transition: all 0.2s;
            outline: none;
            width: 100%;
            text-align: center;
            color: var(--text-color);
            font-weight: 700;
            background: #fff;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            background: #fff0f5;
            transform: scale(1.02);
            box-shadow: 0 0 0 5px rgba(244, 114, 182, 0.2);
        }

        /* Butoane rotunde și moi */
        .btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 16px 30px;
            border-radius: 50px; /* Foarte rotund */
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            box-shadow: 0 6px 0 #be185d; /* Efect 3D buton */
        }

        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 0 #be185d;
        }

        .btn:active { 
            transform: translateY(4px); 
            box-shadow: 0 0 0 #be185d;
        }

        .message {
            margin-top: 1.5rem;
            padding: 15px;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            min-height: 55px;
            opacity: 0;
            transition: opacity 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message.success { 
            background-color: #d1fae5; 
            color: #047857; 
            opacity: 1; 
            border: 2px solid #6ee7b7;
        }

        .message.error { 
            background-color: #ffe4e6; 
            color: #be123c; 
            opacity: 1; 
            border: 2px solid #fda4af;
        }

        /* Ecranul Final */
        #final-screen {
            text-align: center;
            padding: 20px 0;
        }
        
        .big-emoji {
            font-size: 4rem;
            margin-bottom: 10px;
            display: block;
        }

        .big-score {
            font-size: 5rem;
            font-weight: 900;
            color: var(--primary-color);
            line-height: 1;
            margin: 10px 0;
            text-shadow: 3px 3px 0px #fbcfe8;
        }

        .time-display {
            font-size: 1.8rem;
            color: #831843;
            margin-bottom: 2rem;
            font-weight: 700;
            background: #fff1f2;
            display: inline-block;
            padding: 10px 20px;
            border-radius: 50px;
        }

        .btn-restart {
            background-color: var(--secondary-color);
            box-shadow: 0 6px 0 #7c3aed;
        }
        .btn-restart:hover { box-shadow: 0 8px 0 #7c3aed; }
        .btn-restart:active { box-shadow: 0 0 0 #7c3aed; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }

    </style>
</head>
<body>

    <main class="container" id="game-card">
        
        <!-- Bara de Progres -->
        <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
        </div>

        <!-- Ecranul de Joc -->
        <div id="game-screen">
            <header>
                <h1>✨ Calculează Cu Mine ✨</h1>
                <p class="subtitle">Hai să rezolvăm 5 probleme!</p>
            </header>

            <div class="status-bar">
                <span>📝 Problema: <span id="problem-count">1</span>/5</span>
                <span>⏱️ <span id="timer">00:00</span></span>
            </div>

            <section class="equations" aria-label="Problema de matematică">
                <div class="eq-row">
                    <span class="variable">a</span> + <span class="variable">b</span> = <span class="value" id="val-k">?</span>
                </div>
                <div class="eq-row">
                    <span class="variable">a</span> - <span class="variable">b</span> = <span class="value" id="val-m">?</span>
                </div>
            </section>

            <form id="game-form" onsubmit="return false;">
                <div class="input-group">
                    <div class="input-wrapper">
                        <label for="input-a">Care este a?</label>
                        <input type="number" id="input-a" placeholder="?" required autocomplete="off">
                    </div>
                    <div class="input-wrapper">
                        <label for="input-b">Care este b?</label>
                        <input type="number" id="input-b" placeholder="?" required autocomplete="off">
                    </div>
                </div>
                <button type="button" id="check-btn" class="btn">Verifică ✨</button>
            </form>

            <div id="feedback-msg" class="message"></div>
        </div>

        <!-- Ecranul Final (Rezultate) -->
        <div id="final-screen" class="hidden">
            <span class="big-emoji">🎉</span>
            <h2>Bravo! Ai terminat!</h2>
            <br>
            <p class="subtitle">Ai terminat testul în:</p>
            
            <div class="time-display" id="final-time">o ora</div>
            
            <p style="margin-bottom: 10px; font-weight: 700;">Scorul tău:</p>
            <div class="big-score" id="final-score">5/5</div>

            <button type="button" id="restart-btn" class="btn btn-restart">Joacă din nou 🚀</button>
        </div>

    </main>

    <script>
        // Configurare Joc
        const MAX_PROBLEMS = 5;
        
        // Starea jocului
        let currentA = 0;
        let currentB = 0;
        let problemsSolved = 0;
        let score = 0;
        let isProblemSolved = false;
        let startTime = null;
        let timerInterval = null;

        // Elemente DOM
        const elK = document.getElementById('val-k');
        const elM = document.getElementById('val-m');
        const inputA = document.getElementById('input-a');
        const inputB = document.getElementById('input-b');
        const checkBtn = document.getElementById('check-btn');
        const feedbackMsg = document.getElementById('feedback-msg');
        const countDisplay = document.getElementById('problem-count');
        const timerDisplay = document.getElementById('timer');
        const progressBar = document.getElementById('progress-bar');
        const gameCard = document.getElementById('game-card');

        // Ecrane
        const gameScreen = document.getElementById('game-screen');
        const finalScreen = document.getElementById('final-screen');
        const finalTimeDisplay = document.getElementById('final-time');
        const restartBtn = document.getElementById('restart-btn');

        // Inițializare
        function initGame() {
            problemsSolved = 0;
            score = 0;
            startTime = Date.now();
            isProblemSolved = false;

            // Resetare UI
            gameScreen.classList.remove('hidden');
            finalScreen.classList.add('hidden');
            countDisplay.textContent = "1";
            updateProgress();
            
            // Pornire Cronometru
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(updateTimer, 1000);
            updateTimer();

            generateProblem();
            
            // Event Listeners
            checkBtn.onclick = checkAnswer;
            restartBtn.onclick = initGame;

            // Enter key
            [inputA, inputB].forEach(input => {
                input.onkeypress = (e) => {
                    if (e.key === 'Enter') {
                        if (isProblemSolved) {
                            if (problemsSolved < MAX_PROBLEMS) {
                                nextProblem();
                            }
                        } else {
                            checkAnswer();
                        }
                    }
                };
            });
        }

        function updateTimer() {
            const now = Date.now();
            const diff = Math.floor((now - startTime) / 1000);
            
            const minutes = Math.floor(diff / 60);
            const seconds = diff % 60;
            
            // Afișăm normal în timpul jocului, dar la final schimbăm textul
            let timeString = "";
            if (minutes > 0) {
                timeString = `${minutes} min ${seconds} sec`;
            } else {
                timeString = `${seconds} secunde`;
            }
            
            timerDisplay.textContent = timeString;
        }

        // Generare problemă
        function generateProblem() {
            isProblemSolved = false;
            inputA.value = '';
            inputB.value = '';
            inputA.focus();
            feedbackMsg.className = 'message';
            feedbackMsg.textContent = '';

            const min = 1;
            const max = 20; // Numere ușoare
            let num1 = Math.floor(Math.random() * (max - min + 1)) + min;
            let num2 = Math.floor(Math.random() * (max - min + 1)) + min;

            // Fără negative
            if (num2 > num1) {
                currentA = num2;
                currentB = num1;
            } else {
                currentA = num1;
                currentB = num2;
            }

            elK.textContent = currentA + currentB;
            elM.textContent = currentA - currentB;
        }

        // Verificare
        function checkAnswer() {
            if (isProblemSolved) return;

            const userA = parseInt(inputA.value);
            const userB = parseInt(inputB.value);

            if (isNaN(userA) || isNaN(userB)) {
                showMessage("Trebuie să scrii ambele numere!", "error");
                return;
            }

            if (userA === currentA && userB === currentB) {
                // Corect
                score++;
                isProblemSolved = true;
                showMessage("Super! Corect! 🌟", "success");
                
                setTimeout(nextProblem, 1000); 
            } else {
                // Greșit
                showMessage("Nu e chiar așa... Mai încearcă! 💪", "error");
                gameCard.classList.add('shake');
                setTimeout(() => gameCard.classList.remove('shake'), 400);
            }
        }

        // Trecere la următoarea problemă sau Final
        function nextProblem() {
            problemsSolved++;
            
            if (problemsSolved >= MAX_PROBLEMS) {
                endGame();
            } else {
                countDisplay.textContent = problemsSolved + 1;
                updateProgress();
                generateProblem();
            }
        }

        function updateProgress() {
            const percentage = (problemsSolved / MAX_PROBLEMS) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        // Finalizare joc
        function endGame() {
            clearInterval(timerInterval);
            gameScreen.classList.add('hidden');
            finalScreen.classList.remove('hidden');
            
            // Afișare rezultate
            finalTimeDisplay.textContent = "o ora"; 
            scoreDisplay.textContent = `${score}/${MAX_PROBLEMS}`;
            
            // Bara de progres completă
            progressBar.style.width = '100%';
        }

        function showMessage(text, type) {
            feedbackMsg.textContent = text;
            feedbackMsg.className = `message ${type}`;
        }

        // Start
        initGame();

    </script>
</body>
          </html>
